<!DOCTYPE html>
<html>
    <head>
        <title>To-Do List</title>
    </head>
    <style>
        body{
            background-color: #1e1e2f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        input{
            width: 50;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid gray;
        }
        button{
            width:auto;
            padding: 5px 10px;
            background-color: blue;
            color: rgb(255, 255, 255);
            border: none;
            border-radius: 1px;
        }
        button:hover{
            background-color:rgb(71, 2, 199);
        }
        li{
            margin-top: 10px;
            padding: 8px;
            background: lightgrey;
            border-radius: 5px;
            cursor: pointer;
        }
        h1{
            text-align: center;
            color: #333;
            margin-bottom: 15px;
        }
    </style>
    <body>
        <h1>To-Do List</h1>
        <div class="container">
            <input type="text" id="task" placeholder="Enter your task">
            <ul id="list"></ul>
            <button onclick="addTask()">Add Task</button>
        </div>
    </body>
    <script>
        function addTask(){
            let task=document.getElementById("task").value;
            let li=document.createElement("li");
            li.innerText=task;
            li.onclick=function(){
                li.remove();
            }
            document.getElementById("list").appendChild(li);

        }
    </script>
      
</html>

<!DOCTYPE html>
<html>
    <head>
        <title style="font-family: Arial;">Calculator</title>
    </head>
    <style>
        body{
            background-color: rgb(8, 8, 10);
            font-family: Arial;
            text-align:center;
            color: white;
        }
        .calculator{
            background-color: white;
            color: black;
            width: 300px;
            margin: 100px auto;
            padding: 20px;
            border-radius: 10px;
        }
        input{
            width: 30%;
            height: 30px;
            margin: 10px;
            text-align: center;
        }
        button{
            padding: 10px;
            margin: 5px;
            width: 100px;
            border: none;
            background-color: rgb(218, 9, 9);
            color: white;
            border-radius: 5px;
        
        }
        button.hover{
            background-color: darkblue;
        }
        box{
            width: 300px;
            margin: center;
            padding: none;
            border-radius: round;
        
        }
    </style>
    <body>
        <h1>Simple Calculator</h1>
       <div class="calculator">
         <input type="number" id="num1" placeholder="Enter num 1">
        <br>
        <input type="number" id="num2" placeholder="Enter num 2 ">
        <br>
        <button onclick="Add()">Add</button>
        <button onclick="sub()">Sub</button>
        <button onclick="Mul()">multiple</button>
        <button onclick="div()">divide</button>
        <br>
        <h2 id="result">Result: </h2>
       </div>
    </body>
    <script>
        function Add(){
            let a=Number(document.getElementById("num1").value);
            let b=Number(document.getElementById("num2").value);
            document.getElementById("result").innerText="result:" + (a+b); 
        }
        function sub(){
            let a=document.getElementById("num1").value;
            let b=document.getElementById("num2").value;
            document.getElementById("result").innerText="result:"+(a-b); 
        }
        function Mul(){
            let a=document.getElementById("num1").value;
            let b=document.getElementById("num2").value;
            document.getElementById("result").innerText="result:"+(a*b); 
        }
        function div(){
            let a=document.getElementById("num1").value;
            let b=document.getElementById("num2").value;
            document.getElementById("result").innerText="result:"+(a/b); 
        }
    </script>
</html>
